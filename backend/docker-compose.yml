services:
  inkabot-backend:
    build: .
    restart: unless-stopped
    env_file: .env
    networks:
      - n8n_default
      - inkabot_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.inkabot-api.rule=Host(`api.inkabot.online`)"
      - "traefik.http.routers.inkabot-api.entrypoints=websecure"
      - "traefik.http.routers.inkabot-api.tls=true"
      - "traefik.http.routers.inkabot-api.tls.certresolver=mytlschallenge"
      - "traefik.http.services.inkabot-api.loadbalancer.server.port=8000"
      - "traefik.docker.network=n8n_default"

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: inkabot
      POSTGRES_PASSWORD: inkabot123
      POSTGRES_DB: inkabot_saas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - inkabot_network

networks:
  inkabot_network:
    external: true
  n8n_default:
    external: true

volumes:
  postgres_data:
