services:
  inkabot-backend:
    build: .
    restart: unless-stopped
    env_file: .env
    networks:
      - inkabot_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.inkabot-api.rule=Host(`api.inkabot.pe`)"
      - "traefik.http.routers.inkabot-api.entrypoints=websecure"
      - "traefik.http.routers.inkabot-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.inkabot-api.loadbalancer.server.port=8000"
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inkabot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-inkabot_saas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - inkabot_network

networks:
  inkabot_network:
    external: true

volumes:
  postgres_data:
